<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Budget Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">


<h1 class="title">Budget Tracker</h1>

<!-- TYPE TOGGLE -->
<div class="type-toggle center">
  <button id="incomeBtn" onclick="setType('income')">Income</button>
  <button id="expenseBtn" onclick="setType('expense')">Expense</button>
</div>

<!-- FORM -->
<!-- FORM -->
<div id="formSection" class="form-card">
  <div class="form-row">

    <!-- Amount -->
    <input 
      type="number" 
      id="amount" 
      placeholder="💰 Amount"
    >

    <!-- Category -->
    <select id="category">
      <option value="Salary">Salary</option>
      <option value="Food">Food</option>
      <option value="Transport">Transport</option>
      <option value="Shopping">Shopping</option>
    </select>

    <!-- Description -->
    <input 
      type="text" 
      id="desc" 
      placeholder="📝 Description"
    >

    <!-- Date -->
    <input 
      type="date" 
      id="date"
    >

    <!-- Add Button -->
    <button id="addBtn">Add</button>

  </div>
</div>


<div class="summary">
  <div class="balance" id="balance">Balance: ₹0</div>
  <div class="income-box" id="income">Income: ₹0</div>
  <div class="expense-box" id="expense">Expense: ₹0</div>
</div>

<h2>Savings Goal</h2>

<div class="goal-box">

  <!-- Inputs -->
  <div class="goal-inputs">
    <input type="text" id="goalName" placeholder="Goal name">
    <input type="number" id="goalAmount" placeholder="Goal amount">
    <input type="date" id="goalDate">
    <button onclick="saveGoal()">Set Goal</button>
    <button onclick="deleteGoal()">Delete Goal</button>
  </div>

  <!-- Title -->
  <h3 id="goalDisplay"></h3>

  <!-- Progress -->
  <div class="progress-bar">
    <div id="progressFill"></div>
  </div>

  <!-- Status -->
  <p id="goalStatus"></p>

  <!-- Add -->
  <div class="goal-add">
    <input type="number" id="goalAddAmount" placeholder="Add amount">
    <button onclick="addToGoal()">Add to Goal</button>
  </div>

</div>

<!-- FILTERS -->
<div class="filters">
  <select id="filterMonth"></select>

  <select id="filterType">
    <option value="all">All Types</option>
    <option value="income">Income</option>
    <option value="expense">Expense</option>
  </select>

  <select id="filterCategory"></select>
</div>

<button id="exportBtn" onclick="exportCSV()">📥 Export CSV</button>

<div id="transactionsSection">
  <h2>Transactions</h2>
  <div id="list"></div>
</div>

<h2>Expense Chart</h2>
<div class="chart-container">
  <canvas id="mychart"></canvas>
</div>

<h2>Monthly Summary</h2>
<div id="monthlyList"></div>

<script src="js/script.js"></script>

<div id="toast"></div>
  </div>
</body>
</html>
